    <!-- Interaction and Particle Logic Script -->
    <script>
        // --- DOM REFERENCES ---
        const stage = document.getElementById('animationStage');
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const btnPause = document.getElementById('btnPause');
        const btnCelebrate = document.getElementById('btnCelebrate');
        const btnAirShow = document.getElementById('btnAirShow');
        const pulleyInput = document.getElementById('pulleyInput');
        const pulleyLabel = document.getElementById('pulleyLabel');
        const btnSound = document.getElementById('btnSound');
        const flagAssembly = document.getElementById('flagAssembly');
        const jetsFormation = document.getElementById('jetsFormation');
        const leadJet = document.querySelector('.jet-lead');
        const leftJet = document.querySelector('.jet-left');
        const rightJet = document.querySelector('.jet-right');

        // --- STATE VARIABLES ---
        let particles = [];
        let isPaused = false;
        let activeTheme = 'day';
        let isAirShowActive = false;
        let flagProgress = 0;

        const tricolorCodes = ['#FF9933', '#FFFFFF', '#128807'];

        // --- RESIZE CANVAS ---
        function resizeCanvas() {
            canvas.width = stage.clientWidth;
            canvas.height = stage.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- PARTICLE CLASSES ---
        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4.5 + 1.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
                this.gravity = 0.06;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class FireworkRocket {
            constructor(startX, startY, targetX, targetY, color) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                const distance = Math.hypot(targetX - startX, targetY - startY);
                this.duration = distance / 7.5;
                this.vx = (targetX - startX) / this.duration;
                this.vy = (targetY - startY) / this.duration;
                this.progress = 0;
                this.alpha = 1.0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.progress++;
                if (this.progress >= this.duration) {
                    this.alpha = 0; // Trigger explosion
                    triggerExplosion(this.targetX, this.targetY, this.color);
                }
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class PetalParticle {
            constructor() {
                const flagBottomVal = parseFloat(flagAssembly.style.bottom) || 25;
                const flagY = canvas.height - flagBottomVal - 20;
                
                this.x = canvas.width / 2 + (Math.random() - 0.2) * 45;
                this.y = flagY + Math.random() * 20;
                this.color = tricolorCodes[Math.floor(Math.random() * tricolorCodes.length)];
                this.size = Math.random() * 4 + 4;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.08;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = Math.random() * 1.2 + 0.8;
                this.oscillationSpeed = Math.random() * 0.04 + 0.02;
                this.oscillationAngle = Math.random() * Math.PI * 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.002 + 0.001;
            }
            update() {
                this.oscillationAngle += this.oscillationSpeed;
                this.x += Math.sin(this.oscillationAngle) * 0.45 + this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                
                if (this.y >= canvas.height - 10) {
                    this.y = canvas.height - 10;
                    this.vx *= 0.9;
                    this.vy = 0;
                    this.alpha -= 0.02;
                } else {
                    this.alpha -= this.decay;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.quadraticCurveTo(this.size * 0.6, 0, 0, this.size);
                ctx.quadraticCurveTo(-this.size * 0.6, 0, 0, -this.size);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        class SmokeParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3.5 + 3.5;
                this.alpha = 0.85;
                this.decay = Math.random() * 0.008 + 0.006;
                this.vx = -1.3 + (Math.random() - 0.5) * 0.4;
                this.vy = 0.35 + (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.size += 0.2;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // --- PARTICLE EMITTERS ---
        function triggerExplosion(x, y, color) {
            for (let i = 0; i < 45; i++) {
                particles.push(new FireworkParticle(x, y, color));
            }
        }

        function spawnFirework() {
            const startX = Math.random() * canvas.width;
            const startY = canvas.height;
            const targetX = Math.random() * canvas.width * 0.6 + canvas.width * 0.2;
            const targetY = Math.random() * canvas.height * 0.4 + 30;
            const color = tricolorCodes[Math.floor(Math.random() * tricolorCodes.length)];
            particles.push(new FireworkRocket(startX, startY, targetX, targetY, color));
        }

        function spawnSmokeTrails() {
            const stageRect = stage.getBoundingClientRect();
            const leadRect = leadJet.getBoundingClientRect();
            const leftRect = leftJet.getBoundingClientRect();
            const rightRect = rightJet.getBoundingClientRect();
            
            const leadExhaustX = (leadRect.left + leadRect.right) / 2 - stageRect.left;
            const leadExhaustY = leadRect.bottom - stageRect.top;
            
            const leftExhaustX = (leftRect.left + leftRect.right) / 2 - stageRect.left;
            const leftExhaustY = leftRect.bottom - stageRect.top;
            
            const rightExhaustX = (rightRect.left + rightRect.right) / 2 - stageRect.left;
            const rightExhaustY = rightRect.bottom - stageRect.top;
            
            // Left is Saffron, Lead is White, Right is Green
            particles.push(new SmokeParticle(leftExhaustX, leftExhaustY, '#FF9933'));
            particles.push(new SmokeParticle(leadExhaustX, leadExhaustY, '#FFFFFF'));
            particles.push(new SmokeParticle(rightExhaustX, rightExhaustY, '#128807'));
        }

        // --- ANIMATION LOOP ---
        function animLoop() {
            if (!isPaused) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (isAirShowActive) {
                    spawnSmokeTrails();
                }
                
                if (flagProgress === 100) {
                    for (let i = 0; i < 2; i++) {
                        particles.push(new PetalParticle());
                    }
                }
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw();
                    
                    if (p.alpha <= 0 || (p.size <= 0.2 && p.decay)) {
                        particles.splice(i, 1);
                    }
                }
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].draw();
                }
            }
            requestAnimationFrame(animLoop);
        }
        requestAnimationFrame(animLoop);

        // --- CONTROLS LISTENERS ---

        // Pause Toggle
        btnPause.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                stage.classList.add('paused');
                btnPause.classList.add('paused-state');
                btnPause.querySelector('.btn-icon').textContent = '▶';
                btnPause.querySelector('.btn-text').textContent = 'Play';
                if (isAnthemPlaying && audioCtx) {
                    audioCtx.suspend();
                }
            } else {
                stage.classList.remove('paused');
                btnPause.classList.remove('paused-state');
                btnPause.querySelector('.btn-icon').textContent = '⏸';
                btnPause.querySelector('.btn-text').textContent = 'Pause';
                if (isAnthemPlaying && audioCtx) {
                    audioCtx.resume();
                }
            }
        });

        // Celebrate Emitter
        btnCelebrate.addEventListener('click', () => {
            for (let i = 0; i < 3; i++) {
                setTimeout(spawnFirework, i * 250);
            }
        });

        // Air Show Flypast
        btnAirShow.addEventListener('click', () => {
            if (isAirShowActive) return;
            isAirShowActive = true;
            jetsFormation.classList.add('fly-active');
        });

        jetsFormation.addEventListener('animationend', () => {
            jetsFormation.classList.remove('fly-active');
            isAirShowActive = false;
        });

        // Pulley System
        function updateFlagPosition() {
            const val = parseInt(pulleyInput.value);
            flagProgress = val;
            pulleyLabel.textContent = `FLAG PULLEY: ${val}%`;
            
            const flagpolePole = document.querySelector('.flagpole-pole');
            const totalHeight = flagpolePole.clientHeight || 360;
            
            const minBottom = 25;
            const maxBottom = totalHeight - 35;
            const bottomVal = minBottom + (val / 100) * (maxBottom - minBottom);
            
            flagAssembly.style.bottom = bottomVal + 'px';
            
            if (val === 100) {
                if (!flagAssembly.classList.contains('unfurled')) {
                    flagAssembly.classList.add('unfurled');
                    // Explosion of petals on initial hoist completion
                    for (let i = 0; i < 45; i++) {
                        particles.push(new PetalParticle());
                    }
                }
            } else {
                flagAssembly.classList.remove('unfurled');
            }
        }
        pulleyInput.addEventListener('input', updateFlagPosition);
        window.addEventListener('resize', updateFlagPosition);
        updateFlagPosition();

        // Theme selection
        const themeButtons = document.querySelectorAll('.btn-time');
        themeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                themeButtons.forEach(b => b.classList.remove('active-theme'));
                btn.classList.add('active-theme');
                
                const targetTheme = btn.getAttribute('data-theme');
                activeTheme = targetTheme;
                
                stage.className = 'animation-stage';
                stage.classList.add(`stage-${targetTheme}`);
                
                if (isPaused) {
                    stage.classList.add('paused');
                }
            });
        });

        // --- WEB AUDIO API ANTHEM SYNTHESIZER ---
        let audioCtx = null;
        let isAnthemPlaying = false;
        let noteTimeout = null;
        let currentNoteIndex = 0;

        const C4 = 261.63, D4 = 293.66, E4 = 329.63, F4 = 349.23, G4 = 392.00, A4 = 440.00, B4 = 493.88;
        const C5 = 523.25, B4b = 466.16;

        const anthemNotes = [
            [C4, 1], [D4, 1], [E4, 1], [E4, 1], [E4, 1], [E4, 1], [E4, 1], [E4, 1], [E4, 1], [E4, 0.5], [D4, 0.5], [E4, 1], [F4, 1],
            [E4, 1.5], [E4, 0.5], [E4, 1], [D4, 1], [D4, 1], [D4, 1], [C4, 2],
            
            [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [F4, 0.5], [E4, 0.5], [D4, 1], [F4, 1], [E4, 2],
            
            [C4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [A4, 0.5], [G4, 0.5], [F4, 1], [E4, 1], [D4, 1.5], [F4, 0.5], [E4, 2],
            
            [F4, 1.5], [F4, 0.5], [F4, 1], [E4, 1], [E4, 1], [D4, 1], [D4, 1], [D4, 1], [C4, 2],
            
            [E4, 1], [E4, 1], [E4, 1.5], [E4, 0.5], [D4, 1], [G4, 1], [G4, 1], [G4, 1], [F4, 1], [F4, 2],
            [E4, 1], [E4, 1], [E4, 1.5], [E4, 0.5], [D4, 1], [G4, 1], [G4, 1], [F4, 0.5], [E4, 0.5], [D4, 1], [F4, 1], [E4, 2],
            
            [E4, 1], [E4, 1], [E4, 1], [E4, 1], [E4, 1], [D4, 1], [E4, 1], [F4, 1], [E4, 1], [D4, 2],
            
            [C4, 1], [D4, 1], [E4, 1], [E4, 1], [E4, 1.5], [E4, 0.5], [D4, 1], [E4, 1], [F4, 1], [E4, 2],
            
            [E4, 0.5], [F4, 0.5], [G4, 1], [G4, 1], [G4, 1.5], [F4, 0.5], [E4, 1], [D4, 1], [F4, 1], [E4, 2],
            
            [E4, 1.5], [E4, 0.5], [D4, 1], [D4, 1], [D4, 1], [D4, 1], [C4, 2],
            
            [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [G4, 1], [F4, 0.5], [E4, 0.5], [D4, 1], [F4, 1], [E4, 2],
            
            [E4, 1.5], [E4, 0.5], [D4, 1], [D4, 1], [D4, 1], [D4, 1], [C4, 2],
            
            [C5, 2], [B4, 2], [C5, 4],
            [A4, 2], [G4, 2], [A4, 4],
            [F4, 2], [E4, 2], [F4, 4],
            
            [C4, 1], [C4, 1], [D4, 1], [D4, 1], [E4, 1], [E4, 1], [F4, 1], [E4, 1], [D4, 1], [C4, 3]
        ];

        function playSynthNote(freq, durationSec) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 2, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.04);
            gainNode.gain.setValueAtTime(0.18, audioCtx.currentTime + durationSec - 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationSec);
            
            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc1.start();
            osc2.start();
            
            osc1.stop(audioCtx.currentTime + durationSec);
            osc2.stop(audioCtx.currentTime + durationSec);
        }

        function playNextAnthemNote() {
            if (!isAnthemPlaying || currentNoteIndex >= anthemNotes.length) {
                isAnthemPlaying = false;
                btnSound.classList.remove('sound-active');
                btnSound.querySelector('.sound-icon').textContent = '🔇';
                return;
            }
            
            const [freq, duration] = anthemNotes[currentNoteIndex];
            const tempo = 220; 
            const noteDurationMs = duration * tempo;
            
            playSynthNote(freq, noteDurationMs / 1000);
            
            currentNoteIndex++;
            noteTimeout = setTimeout(playNextAnthemNote, noteDurationMs);
        }

        function playAnthem() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            isAnthemPlaying = true;
            currentNoteIndex = 0;
            playNextAnthemNote();
        }

        function stopAnthem() {
            isAnthemPlaying = false;
            if (noteTimeout) {
                clearTimeout(noteTimeout);
                noteTimeout = null;
            }
        }

        function toggleAnthem() {
            if (isAnthemPlaying) {
                stopAnthem();
                btnSound.classList.remove('sound-active');
                btnSound.querySelector('.sound-icon').textContent = '🔇';
            } else {
                btnSound.classList.add('sound-active');
                btnSound.querySelector('.sound-icon').textContent = '🎵';
                playAnthem();
            }
        }

        btnSound.addEventListener('click', toggleAnthem);
    </script>
</body>
</html>
