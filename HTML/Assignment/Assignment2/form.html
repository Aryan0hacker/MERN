<!DOCTYPE html>
<html>
<head>
    <title>FORMS</title>
</head>
<body>
    <h1>FORMS</h1>
    <form>
        
        <label>Name:</label>
        <input type="text" name="name" placeholder="Name"><br><br>

        <label>Email-id:</label>
        <input type="email" name="email" placeholder="Email-id"><br><br>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Password"><br><br>

        <label>Phone No:</label>
        <input type="tel" name="phone" placeholder="10 digit"><br><br>

        
        <label>Language:</label><br>
        <input type="radio" name="language" value="HTML"> HTML<br>
        <input type="radio" name="language" value="CSS"> CSS<br>
        <input type="radio" name="language" value="JS"> JS<br><br>

        
        <label>Course:</label><br>
        <input type="checkbox" name="course" value="Java Stack"> Java Stack<br>
        <input type="checkbox" name="course" value="Data Science"> Data Science<br>
        <input type="checkbox" name="course" value="Mern Stack"> Mern Stack<br><br>

        
        <label>Field:</label>
        <select name="field">
            <option value="" selected>Select</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JS">JS</option>
        </select><br><br>

        
        <label>Describe yourself:</label><br>
        <textarea name="description" rows="4" cols="40" placeholder="Describe yourself"></textarea><br><br>

        
        <label>Date:</label>
        <input type="date" name="date"><br><br>

        
        <input type="submit" value="Submit"><br><br>

        
        <a href="table.html">Click Here For Table File</a>
    </form>
</body>
</html>
